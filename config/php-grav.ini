; Grav CMS optimized PHP settings
; https://learn.getgrav.org/basics/requirements

; Memory and execution
memory_limit = 512M
max_execution_time = 60
max_input_time = 60

; Upload limits
upload_max_filesize = 128M
post_max_size = 128M
max_file_uploads = 20

; Error handling (set to On for development)
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Session settings
session.gc_maxlifetime = 1440
session.cookie_httponly = 1

; Security
expose_php = Off

; OPcache settings (required for Grav performance)
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
opcache.validate_timestamps = 1

; APCu settings (user cache for Grav)
apc.enabled = 1
apc.shm_size = 64M
apc.enable_cli = 1

; Timezone (can be overridden via environment)
date.timezone = UTC
